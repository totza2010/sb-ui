name: release

# Tag a release as vX.Y.Z to build + publish the binaries.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. v0.7.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags for the changelog

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: go.sum

      - name: Resolve version
        id: ver
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "version=${{ inputs.version }}" >>"$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME}" >>"$GITHUB_OUTPUT"
          fi

      - name: Build changelog
        env:
          TAG: ${{ steps.ver.outputs.version }}
        run: |
          # Endpoint = the tag if it exists, else HEAD (manual dispatch).
          END=$(git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null && echo "$TAG" || echo HEAD)
          PREV=$(git describe --tags --abbrev=0 "${END}^" 2>/dev/null || echo "")
          {
            if [ -n "$PREV" ]; then
              echo "## What's changed since ${PREV}"
              echo
              git log "${PREV}..${END}" --no-merges --pretty='- `%h` %s (%an)'
              echo
              echo "**Full diff:** https://github.com/${GITHUB_REPOSITORY}/compare/${PREV}...${TAG}"
            else
              echo "## Commits"
              echo
              git log "${END}" --no-merges --pretty='- `%h` %s (%an)'
            fi
          } > RELEASE_NOTES.md

      - name: Build frontend once
        run: |
          cd frontend
          npm ci
          npm run build
          rm -rf ../web && mkdir -p ../web
          cp -r dist/. ../web/

      - name: Cross-compile binaries
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          mkdir -p dist
          for arch in amd64 arm64; do
            OUT="dist/sb-ui-linux-$arch" SKIP_WEB=1 bash ./build.sh linux "$arch"
          done
          # Saltbox mod role (versioned alongside the binary).
          tar -C deploy/saltbox_mod/roles -czf dist/sb-ui-role.tar.gz sbui
          ( cd dist && sha256sum sb-ui-linux-* sb-ui-role.tar.gz > checksums.txt )

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.version }}
          name: sb-ui ${{ steps.ver.outputs.version }}
          body_path: RELEASE_NOTES.md
          generate_release_notes: true
          files: |
            dist/sb-ui-linux-amd64
            dist/sb-ui-linux-arm64
            dist/sb-ui-role.tar.gz
            dist/checksums.txt
