name: release

# Tag a release as vX.Y.Z to build + publish the binaries.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. v0.7.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: go.sum

      - name: Resolve version
        id: ver
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "version=${{ inputs.version }}" >>"$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME}" >>"$GITHUB_OUTPUT"
          fi

      - name: Build frontend once
        run: |
          cd frontend
          npm ci
          npm run build
          rm -rf ../web && mkdir -p ../web
          cp -r dist/. ../web/

      - name: Cross-compile binaries
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          mkdir -p dist
          for arch in amd64 arm64; do
            OUT="dist/sb-ui-linux-$arch" SKIP_WEB=1 bash ./build.sh linux "$arch"
          done
          ( cd dist && sha256sum sb-ui-linux-* > checksums.txt )

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: sb-ui ${{ steps.ver.outputs.version }}
          generate_release_notes: true
          files: |
            dist/sb-ui-linux-amd64
            dist/sb-ui-linux-arm64
            dist/checksums.txt
