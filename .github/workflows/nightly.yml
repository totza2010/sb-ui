name: nightly

# Every push to master publishes a moving `nightly` pre-release with the binaries,
# so the real box can self-update to a master build (nightly channel) for testing —
# without cutting a stable vX.Y.Z tag. Stable releases (release.yml) are unaffected:
# GitHub's releases/latest ignores pre-releases.
on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: nightly
  cancel-in-progress: true

jobs:
  nightly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache-dependency-path: go.sum

      - name: Resolve version
        id: ver
        run: echo "version=$(git describe --tags --always --match 'v*')" >>"$GITHUB_OUTPUT"

      - name: Build frontend once
        run: |
          cd frontend
          npm ci
          npm run build
          rm -rf ../web && mkdir -p ../web
          cp -r dist/. ../web/

      - name: Cross-compile binaries
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          mkdir -p dist
          for arch in amd64 arm64; do
            OUT="dist/sb-ui-linux-$arch" SKIP_WEB=1 bash ./build.sh linux "$arch"
          done
          tar -C deploy/saltbox_mod/roles -czf dist/sb-ui-role.tar.gz sbui
          ( cd dist && sha256sum sb-ui-linux-* sb-ui-role.tar.gz > checksums.txt )

      - name: Remove previous nightly (move the tag)
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release delete nightly --cleanup-tag --yes || true

      - name: Publish nightly pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: ${{ steps.ver.outputs.version }}
          prerelease: true
          make_latest: false
          body: |
            Nightly build from `master` — **pre-release, for testing only.**
            Version `${{ steps.ver.outputs.version }}` · commit ${{ github.sha }}
          files: |
            dist/sb-ui-linux-amd64
            dist/sb-ui-linux-arm64
            dist/sb-ui-role.tar.gz
            dist/checksums.txt
