# air config — hot-reload the Go backend in dev.
# The frontend is served separately by the Vite dev server (npm run dev), which
# proxies /api + /ws to this backend on :8000. See README "Frontend dev".
root = "."
tmp_dir = "tmp"

[build]
  # Plain go build (no frontend rebuild, no -ldflags) — fast (~1s).
  cmd = "go build -o ./tmp/sb-ui-dev.exe ."
  bin = "./tmp/sb-ui-dev.exe"
  include_ext = ["go"]
  exclude_dir = ["frontend", "web", "tmp", "dist", "deploy", ".git", ".github"]
  exclude_regex = ["_test\\.go", ".*\\.tmp.*"]
  # Poll file mtimes instead of fsnotify. Editors (and Claude's tools) save
  # atomically via a temp file + rename, which breaks fsnotify's directory watch
  # on Windows ("failed to watch ...api.go.tmp...") and leaves the backend dead.
  # Polling is immune to that.
  poll = true
  poll_interval = 500
  delay = 500
  stop_on_error = true
  kill_delay = "2s"

[misc]
  clean_on_exit = true
